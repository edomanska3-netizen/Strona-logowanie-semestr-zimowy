{% extends 'base.html' %}
{% block content %}
<h2>Twoje zadania</h2>
<form method="post">
    <input name="content" placeholder="Nowe zadanie">
    <button>Dodaj</button>
</form>
<ul>
{% for task in tasks %}
<li>
    {{ task.content }}
    {% if not task.completed %}
        <a href="/complete/{{ task.id }}">✔</a>
    {% endif %}
    <a href="/delete/{{ task.id }}">🗑</a>
</li>
{% endfor %}
</ul>
<a href="/logout">Wyloguj</a>
{% endblock %}
